<!doctype html>
<html lang="vi">

<head>
    <title>Trang chủ</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="asset/favicon.ico">
    <link rel="stylesheet" href="asset/css/bootstrap.min.css">
    <link rel="stylesheet" href="asset/css/custom.css">
    <link rel="stylesheet" href="asset/css/all.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <!-- Logo/Brand -->
                <a class="navbar-brand" href="/">
                    <img src="https://getbootstrap.com/docs/4.1/assets/brand/bootstrap-solid.svg" width="30" height="30"
                        class="d-inline-block align-top" alt="">
                    Bootstrap
                </a>

                <!-- Nút chức năng của Mobile -->
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Thanh Menu -->
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active">
                            <a class="nav-link" href="/"><i class="fas fa-home"></i> Trang chủ</span></a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="#"><i class="fas fa-tasks"></i> Đề bài</span></a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="#"><i class="fas fa-clock"></i> Kỳ thi</span></a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="#"><i class="fas fa-book-reader"></i> Thư viện</span></a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="#" data-toggle="modal" data-target="#exampleModal"><i class="fas fa-sign-in-alt"></i>
                                Đăng nhập <i class="fas fa-caret-down"></i></a>

                            <!-- Modal của Đăng Nhập -->
                            <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
                                aria-hidden="true">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="exampleModalLabel">Đăng nhập hệ thống</h5>
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                        </div>
                                        <div class="modal-body">
                                            <form>
                                                <div class="form-group">
                                                    <label for="exampleInputEmail1"><i class="fas fa-user"></i> Tên
                                                        đăng nhập</label>
                                                    <input type="text" class="form-control" id="exampleInputEmail1"
                                                        placeholder="Nhập tài khoản" aria-describedby="emailHelp">
                                                </div>
                                                <div class="form-group">
                                                    <label for="exampleInputEmail1"><i class="fas fa-key"></i> Mật khẩu</label>
                                                    <a href="signup_user.html" style="float:right">Quên mật khẩu ?</a>
                                                    <input type="password" class="form-control" id="exampleInputEmail1"
                                                        placeholder="Nhập mật khẩu" aria-describedby="emailHelp">
                                                </div>

                                                <div class="form-group form-check">
                                                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                                                    <label class="form-check-label" for="exampleCheck1">Ghi nhớ tài
                                                        khoản</label>
                                                </div>
                                                <button type="submit" class="btn btn-success"><i class="fas fa-sign-in-alt"></i>
                                                    Đăng nhập</button>
                                                <button type="submit" class="btn btn-default" data-dismiss="modal"
                                                    aria-label="Close"><i class="fas fa-times"></i> Đóng</button><br><br>
                                                Chưa có tài khoản ?
                                                <a href="signup_user.html"><i>Đăng ký ngay</i></a>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col-md-3"></div>
                <div class="col-md-6">
                    <div class="card" id="regisForm">
                        <div class="card-header">
                            <h5>Đăng ký tài khoản</h3>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="far fa-user"></i> Tên đăng nhập</label>
                                    <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Viết liền không dấu"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="far fa-envelope"></i> Địa chỉ Email</label>
                                    <input type="email" class="form-control" id="exampleInputPassword1" placeholder="Link kích hoạt tài khoản sẽ gửi về email này"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="fas fa-signature"></i> Họ tên</label>
                                    <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Vui lòng sử dụng tên thật"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="far fa-calendar"></i> Ngày sinh</label>
                                    <input type="date" class="form-control" id="exampleInputPassword1" placeholder="dd/mm/yyyy"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="fas fa-key"></i> Mật khẩu</label>
                                    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Tối thiểu 8 ký tự"
                                        required>
                                </div>
                                <div class="form-group">
                                    <label for="exampleInputPassword1"><i class="fas fa-key"></i> Nhập lại mật khẩu</label>
                                    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Nhập lại mật khẩu một lần nữa"
                                        required>
                                </div>
                                <button class="btn btn-success" type="submit"><i class="far fa-check-circle"></i> Đăng
                                    ký</button>
                                <button class="btn btn-default"><i class="fas fa-times"></i> Hủy</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-3"></div>
            </div>
        </div>
    </main>
    <hr>
    <footer align=" center">
        <p>© 2018 Developed by <a href="#">BVXT</a></p>
        <p>All Rights Reserved</p>
    </footer>
    <script src="asset/js/jquery-3.3.1.min.js"> </script>
    <script src="asset/js/popper.min.js"> </script>
    <script src="asset/js/bootstrap.min.js"></script>
    <script src="asset/js/custom.js"> </script>
</body>

</html>
